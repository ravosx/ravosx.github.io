<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastavenia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth">
        <h1>Nastavenia</h1>

        <input id="bio" placeholder="Bio">
        <input id="image" placeholder="URL fotky">
        <input id="color" type="color">

        <button onclick="save()">Ulozit</button>
        <button onclick="back()">Spat</button>
    </main>

    <script>
        const savedUser = localStorage.getItem("user");
        const user = savedUser ? JSON.parse(savedUser) : {
            meno: "Ravosx",
            heslo: "",
            bio: "",
            image: "",
            bg: "#298bac"
        };

        document.getElementById("bio").value = user.bio || "";
        document.getElementById("image").value = user.image || "";

        function save() {
            user.bio = document.getElementById("bio").value;
            user.image = document.getElementById("image").value;
            user.bg = document.getElementById("color").value;

            localStorage.setItem("user", JSON.stringify(user));
            window.location.href = "profile.html";
        }

        function back() {
            window.location.href = "profile.html";
        }
    </script>
</body>
</html>
