<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">

        <button onclick="openSettings()">⚙ Nastavenia</button>
        <button onclick="toggleDark()">🌙 Dark mode</button>
        <button onclick="toggleLang()">🌍 Jazyk</button>
        <button onclick="showPeople()">👥 Nájsť ľudí</button>

    </div>

    <div class="main">

        <img id="img" class="avatar">

        <h1 id="meno"></h1>
        <p id="bio"></p>

        <div id="people" class="people"></div>

    </div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

document.getElementById("meno").innerText = user.meno;
document.getElementById("bio").innerText = user.bio || "Žiadne bio";
document.getElementById("img").src = user.image || "https://via.placeholder.com/120";

document.body.style.background = user.bg || "linear-gradient(to bottom, rgb(41,139,172), lightblue)";

function openSettings(){
    window.location.href = "settings.html";
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

let lang = "sk";

function toggleLang(){
    lang = lang === "sk" ? "en" : "sk";
    alert(lang === "sk" ? "Slovenčina" : "English");
}

function showPeople(){
    document.getElementById("people").innerHTML = `
        <h3>Ľudia online</h3>
        <p>Peter</p>
        <p>Jano</p>
        <p>Marek</p>
    `;
}
</script>

</body>
</html>
